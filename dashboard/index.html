<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="CEO Dashboard - Chien luoc, Leo thang, Ket qua, Hanh dong">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>CEO Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SPLASH -->
  <div id="splash" class="splash">
    <div class="splash-content">
      <div class="splash-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
      </div>
      <h1>CEO Dashboard</h1>
      <p>Dang tai du lieu...</p>
      <div class="splash-bar"><div class="splash-progress"></div></div>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <h1 class="topbar-title">CEO Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button id="btnRefresh" class="topbar-btn">Lam moi</button>
        <div class="topbar-time" id="topbarTime"></div>
      </div>
    </header>

    <nav class="tab-nav">
      <button class="tab active" data-tab="overview">
        <span class="tab-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg></span>
        <span class="tab-label">Buc tranh</span>
      </button>
      <button class="tab" data-tab="escalation">
        <span class="tab-icon"><svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span>
        <span class="tab-label">Leo thang</span>
      </button>
      <button class="tab" data-tab="strategy">
        <span class="tab-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>
        <span class="tab-label">Chien luoc</span>
      </button>
      <button class="tab" data-tab="actions">
        <span class="tab-icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
        <span class="tab-label">Hanh dong</span>
      </button>
    </nav>

    <main class="main-content">

      <!-- TAB: BUC TRANH TONG -->
      <section id="tab-overview" class="tab-panel active">
        <!-- Health Score -->
        <div class="health-score-card" id="healthScore"></div>

        <!-- Traffic Light Summary -->
        <div class="section-header">He thong den tin hieu</div>
        <div class="traffic-lights" id="trafficLights"></div>

        <!-- Strategy Pillars Preview -->
        <div class="section-header">8 tru cot chien luoc</div>
        <div class="pillars-grid" id="pillarsGrid"></div>

        <!-- Escalation Funnel -->
        <div class="section-header">Dong chay chi dao</div>
        <div class="funnel-card" id="funnelCard"></div>
      </section>

      <!-- TAB: LEO THANG -->
      <section id="tab-escalation" class="tab-panel">
        <div class="section-header">Bieu do leo thang chi dao</div>
        <div class="escalation-pipeline" id="escalationPipeline"></div>

        <div class="section-header">Chi dao can leo thang</div>
        <div id="escalationList" class="directives-list"></div>
      </section>

      <!-- TAB: CHIEN LUOC -->
      <section id="tab-strategy" class="tab-panel">
        <div class="section-header">Chien luoc dan den dau?</div>
        <div id="strategyMap"></div>
      </section>

      <!-- TAB: HANH DONG -->
      <section id="tab-actions" class="tab-panel">
        <div class="section-header">Can lam ngay</div>
        <div id="urgentActions"></div>

        <div class="section-header">Hanh dong theo trang thai</div>
        <div id="actionsByStatus"></div>

        <div class="section-header">Theo doi tien do</div>
        <div id="progressTracking"></div>
      </section>

    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <button class="modal-close" id="modalClose">&times;</button>
        <div id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
